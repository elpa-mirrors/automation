name: Update package lists

on:
  workflow_dispatch:
  schedule:
    - cron: '28 1/2 * * *'

concurrency:
  group: ${{ github.workflow }}

permissions: {}

jobs:
  mirror:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref || 'master' }}
          persist-credentials: false
          fetch-depth: 0

      - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Generate the package lists
        run: |
          nix flake update gnu-elpa nongnu
          nix build .#package-lists -L
          cp -v result/*.* lists/

      - name: Revert flake.lock if no change has been made in lists/
        id: changes
        run: |
          if git diff --exit-code lists
          then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "elpa-mirrors-package-lists[bot]"
            git config user.email "3757287+elpa-mirrors-package-lists[bot]@users.noreply.github.com"
            git add lists
            git commit -m 'chore: Update the package lists'
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        if: steps.changes.outputs.changed == 'true'
        id: github-token
        with:
          # The app ID isn't a secret at all, but it is fine.
          app-id: ${{ secrets.PACKAGE_LISTS_APP_ID }}
          private-key: ${{ secrets.PACKAGE_LISTS_APP_PRIVATE_KEY }}
          permission-contents: write

      - if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_APP_TOKEN: ${{ steps.github-token.outputs.token }}
          HEAD_REF: ${{ github.head_ref || 'master' }}
        run: |
          git config credential.helper 'cache --timeout=300'
          fill_credential() {
            printf '%s\n' \
              protocol=https \
              host=github.com \
              username=x-access-token \
              "password=$GITHUB_APP_TOKEN" \
              ''
          }
          trap 'fill_credential | git credential reject' EXIT
          fill_credential | git credential approve
          git push origin "HEAD:$HEAD_REF"
